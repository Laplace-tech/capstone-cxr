spring.application.name=backend
ai.service.base-url=http://ai-service:8000
shared.uploads.dir=/shared/uploads
shared.generated.dir=/shared/generated

# PostgreSQL
spring.datasource.url=jdbc:postgresql://postgres:5432/cxrdb
spring.datasource.username=cxruser
spring.datasource.password=cxrpass

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# multipart
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
