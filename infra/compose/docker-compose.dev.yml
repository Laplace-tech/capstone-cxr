services:

  # 1) Frontend Service
  frontend:
    build:
      context: ../../apps/frontend
      dockerfile: ../../infra/docker/frontend.Dockerfile

    ports:
      - "5173:5173"

    environment:
      VITE_BACKEND_PROXY_TARGET: http://backend:8080

    depends_on:
      - backend

  # 2) Backend Service
  backend:
    build:
      context: ../../apps/backend
      dockerfile: ../../infra/docker/backend.Dockerfile

    ports:
      - "8080:8080"

    environment:
      AI_SERVICE_BASE_URL: http://ai-service:8000

      # 백엔드가 업로드 원본과 생성 결과를 참조할 공용 디렉터리 기준 경로
      SHARED_ROOT: /shared
      SHARED_UPLOADS_DIR: /shared/uploads
      SHARED_GENERATED_DIR: /shared/generated

    depends_on:
      - ai-service
      - postgres

    volumes:
      # backend도 shared를 동일하게 마운트해야
      # 업로드 파일 저장 후 ai-service와 같은 경로를 공유 가능
      - ../../shared:/shared

  # 3) AI-Service
  ai-service:
    build:
      context: ../../apps/ai-service
      dockerfile: ../../infra/docker/ai-service.Dockerfile

    ports:
      - "8000:8000"

    environment:
      # AI 서비스도 공용 디렉터리 기준 경로를 명시적으로 받는 편이 낫다
      SHARED_ROOT: /shared
      SHARED_UPLOADS_DIR: /shared/uploads
      SHARED_GENERATED_DIR: /shared/generated
      ARTIFACTS_ROOT: /app/artifacts

    volumes:
      # backend와 동일한 shared mount
      - ../../shared:/shared

      # AI 내부 산출물 전용 공간
      - ../../apps/ai-service/artifacts:/app/artifacts

  # 4) PostgreSQL Service
  postgres:
    image: postgres:16

    ports:
      - "5432:5432"

    environment:
      POSTGRES_DB: cxrdb
      POSTGRES_USER: cxruser
      POSTGRES_PASSWORD: cxrpass

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: